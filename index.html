<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spider Chart Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🕸️ Spider Chart Generator</h1>
        
        <div class="main-content">
            <div class="controls">
                <div class="scale-config" style="margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #475569;">
                    <label>Max. Scale (Points):</label>
                    <input type="number" id="max-scale" value="10" min="1" style="width: 60px; margin-left: 10px;">
                <div class="title-config" style="margin-bottom: 20px;">
                    
                    
                    <label>Título del Gráfico:</label>
                    <input type="text" id="chart-title-input" placeholder="Ej: Mi Perfil Técnico" style="width: 100%; margin-top: 5px;">
                </div>
                </div>

                <div id="skills-container">
                    <div class="input-group">
                        <input type="text" class="label-input" value="Python">
                        <input type="number" class="value-input" value="8" min="0" max="10">
                        <button class="btn-remove" onclick="eliminarFila(this)">-</button>
                    </div>
                </div>

                <button id="add-skill" type="button" style="background: #334155; color: white; margin-bottom: 10px;">
                    + Añadir Skill
                </button>
                
                <button id="download" class="btn-download">Descargar PNG</button>
                <button id="save-chart" style="background-color: #f59e0b; color: white; margin-top: 10px;">
                    💾 Guardar Proyecto Actual
                </button>

                <div class="saved-charts-section" style="margin-top: 30px; border-top: 1px dashed #475569; padding-top: 20px;">
                    <h3>📂 Mis Gráficos Guardados</h3>
                    <div id="saved-list" class="saved-list">
                        </div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div> 
    </div> <script src="script.js"></script>
</body>
</html>
