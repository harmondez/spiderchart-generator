<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spider Chart Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🕸️ Spider Chart Generator</h1>
        
        <div class="main-content">
            <div class="controls">
                <div class="config-section" style="margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #475569;">
                    <div class="scale-config" style="margin-bottom: 15px;">
                        <label>Max. Scale (Points):</label>
                        <input type="number" id="max-scale" value="10" min="1" style="width: 60px; margin-left: 10px;">
                    </div>
                    
                    <div class="title-config">
                        <label>Título del Gráfico:</label>
                        <textarea id="chart-title-input" 
                        placeholder="Ej: Mi Perfil&#10;Técnico" 
                        rows="2"
                        style="width: 100%; margin-top: 5px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 5px; padding: 10px; resize: vertical; font-family: inherit;"></textarea>
                    </div>
                </div>

                <div id="skills-container">
                    <div class="input-group">
                        <input type="text" class="label-input" value="Python">
                        <input type="number" class="value-input" value="8" min="0" max="10">
                        <button class="btn-remove" onclick="eliminarFila(this)">-</button>
                    </div>
                </div>

                <button id="add-skill" type="button" style="background: #334155; color: white; width: 100%; margin-bottom: 10px;">
                    + Añadir Skill
                </button>
                
                <div class="actions" style="display: flex; flex-direction: column; gap: 10px;">
                    <button id="open-themes" style="background-color: #8b5cf6; color: white;">
                        🎨 Personalizar Diseño
                    </button>
                    <button id="save-chart" style="background-color: #f59e0b; color: white;">
                        💾 Guardar Proyecto
                    </button>
                    <button onclick="nuevoProyecto()" style="background-color: #3b82f6; color: white;">
                        ➕ Nuevo Proyecto (Limpiar)
                    </button>
                    <button id="download" class="btn-download">Descargar PNG</button>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="myChart"></canvas>

                <div class="saved-charts-section">
                    <h3>📂 Biblioteca de Perfiles (Comparar)</h3>
                    <div id="saved-list" class="saved-list">
                        </div>
                </div>
            </div>
            </div>
        </div> 
    </div>

    <div id="theme-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: white; margin-bottom: 20px; text-align: center;">Personaliza tu Vibe</h2>
            
            <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">
                1. Selecciona Color
            </h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 25px;">
                <button onclick="aplicarColor('emerald')" style="background: #064e3b; border: 1px solid #10b981;">Emerald</button>
                <button onclick="aplicarColor('ocean')" style="background: #1e3a8a; border: 1px solid #3b82f6;">Ocean</button>
                <button onclick="aplicarColor('sunset')" style="background: #7c2d12; border: 1px solid #f97316;">Sunset</button>
                <button onclick="aplicarColor('neon')" style="background: #831843; border: 1px solid #ec4899;">Neon</button>
                <button onclick="aplicarColor('slate')" style="background: #334155; border: 1px solid #94a3b8;">Slate</button>
                <button onclick="aplicarColor('volcano')" style="background: #7f1d1d; border: 1px solid #ef4444;">Volcano</button>
                <button onclick="aplicarColor('royal')" style="background: #4c1d95; border: 1px solid #8b5cf6;">Royal</button>
                <button onclick="aplicarColor('forest')" style="background: #064e3b; border: 1px solid #22c55e;">Forest</button>
                <button onclick="aplicarColor('gold')" style="background: #713f12; border: 1px solid #eab308;">Gold</button>
                <button onclick="aplicarColor('ghost')" style="background: #1e293b; border: 1px solid #f8fafc;">Ghost</button>
            </div>

            <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">
                2. Selecciona Estilo
            </h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <button onclick="aplicarEstilo('normal')" style="background: #334155; border: 1px solid #475569;">Normal</button>
                <button onclick="aplicarEstilo('bolas')" style="background: #334155; border: 1px solid #475569;">Bolas</button>
                <button onclick="aplicarEstilo('rayas')" style="background: #334155; border: 1px solid #475569;">Rayas</button>
            </div>

            <button onclick="cerrarTemas()" style="margin-top: 35px; width: 100%; background: #3b82f6; color: white; padding: 14px; font-size: 14px;">
                ¡Listo!
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
